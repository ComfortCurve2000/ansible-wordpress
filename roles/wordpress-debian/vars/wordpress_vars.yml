wordpress_vars_exist: Defined
wordpress_host: {{host}} #matches your inventory
wordpress_fqdn: {{wordpress_hostname}} #eg "wordpress.yourdomain.net" or "192.168.0.10" if no dns
custom_certificate: False

#Developed for 6.9.1 on Debian 13
wordpress_version: 6.9.1
php_version: 8.4 # Match this to the version installed by default on debian
wordpress_database_name: {{wordpress_database_name}} #eg wordpress
wordpress_database_password: {{wp_password}} #eg `openssl rand -base64 32`
wordpress_database_user: {{wp_user}} #eg wordpress