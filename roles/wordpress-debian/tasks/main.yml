---
- name: Install
  include_tasks:
    file: install.yml
    apply:
      tags: [install]
  tags: [install]

- name: Configure
  include_tasks:
    file: configure.yml
    apply:
      tags: [configure]
  tags: [configure]

- name: Apache
  include_tasks:
    file: apache.yml
    apply:
      tags: [apache]
  tags: [apache]

- name: Backup
  include_tasks:
    file: backup.yml
    apply:
      tags: [backup]
  tags: [never,backup]

- name: Restore
  include_tasks:
    file: restore.yml
    apply:
      tags: [restore]
  tags: [never,restore]