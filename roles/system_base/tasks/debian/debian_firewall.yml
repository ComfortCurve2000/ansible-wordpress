---
- name: Create directory for rules generated by other roles
  file:
    path: /etc/nftables.d/input
    state: directory
    owner: root
    group: root
    mode: "755"

- name: Initial nftables Configuration
  template:
    src: nftables.j2
    dest: "/etc/nftables.conf"
    owner: root
    group: root
    mode: '644'
    validate: "nft -c -f %s"
  register: nftables_configuration

- name: Apply nftables Configuration
  command: nft -f /etc/nftables.conf
  when: nftables_configuration.changed

- name: Enable/Start nftables
  service:
    name: nftables
    enabled: true
    state: started