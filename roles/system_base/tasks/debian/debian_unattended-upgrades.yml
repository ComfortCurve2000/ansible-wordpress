---
# Does not reboot automatically so that should be manually scheduled or changed in 50unattended-upgrades
- name: Install unattended-upgrades
  apt:
    name:
      - unattended-upgrades
    state: present

- name: Copy 20auto-upgrades Configuration
  template:
    src: 20auto-upgrades.j2
    dest: "/etc/apt/apt.conf.d/20auto-upgrades"
    owner: root
    group: root
    mode: '644'

- name: Enable unattended-upgrades
  service:
    name: unattended-upgrades
    enabled: yes
    state: restarted