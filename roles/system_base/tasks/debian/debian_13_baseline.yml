- name: Update
  apt:
    name: '*'
    state: latest # noqa 403
    update_cache: true
  when: system_base_updates

- name: Install Packages
  apt:
    name:
      - qemu-guest-agent #proxmox
      - acl #used for certain ansible become functions
      - gpg #ansible uses to verify repositories
      - mdadm #raid
      - cryptsetup #luks
      - iotop #disk usage
      - unzip
      - curl
      - vim
      - needrestart
    state: present

- name: Gather installed package facts
  package_facts:
    manager: apt

- name: resolvconf if no network-manager or systemd-resolved
  block:
    - name: Install resolvconf
      apt:
        name: resolvconf
        state: present
    - name: Link for resolvconf
      ansible.builtin.file:
        src: /run/resolvconf/resolv.conf
        dest: /etc/resolv.conf
        state: link   
  when:
    - "'network-manager' not in ansible_facts.packages"
    - "'systemd-resolved' not in ansible_facts.packages"

- stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot Warning
  pause:
    prompt: "Warning: This machine will reboot if needed and ansible disconnected. Press return to continue. Press Ctrl+c and then \"a\" to abort."
  when: reboot_protection and reboot_required.stat.exists

- name: Reboot after updates
  reboot:
  when: reboot_required.stat.exists
