---
- name: FQDN Hostname Protection
  fail:
    msg: "Warning: Hostname protection on this machine has failed, the expected hostname {{ inventory_hostname }} does not match {{ ansible_facts.nodename }}."
  when: not system_base_short_hostname and (ansible_facts.nodename != inventory_hostname) and system_base_hostname_protection

- name: Set FQDN Hostname
  hostname:
    name: "{{ inventory_hostname }}"
  register: system_base_hostname_result
  when: not system_base_short_hostname and (ansible_facts.nodename != inventory_hostname) and not system_base_hostname_protection

- name: Reboot Warning # noqa 503
  pause:
    prompt: "Warning: This machine will reboot. Press return to continue. Press Ctrl+c and then \"a\" to abort."
  when: system_base_hostname_result.changed and reboot_protection
#Reboot appears twice because the variable is registered even if the condition is false
- name: Reboot # noqa 503
  reboot:
  when: system_base_hostname_result.changed

#----------------------------------------------

- name: Short Hostname Protection
  fail:
    msg: "Warning: Hostname protection on this machine has failed, the expected hostname {{ inventory_hostname }} does not match {{ ansible_facts.nodename }}."
  when: system_base_short_hostname and (ansible_facts.nodename != inventory_hostname) and system_base_hostname_protection

- name: Set Short Hostname
  hostname:
    name: "{{ inventory_hostname_short }}"
  register: system_base_hostname_result
  when: system_base_short_hostname and (ansible_facts.nodename != inventory_hostname_short) and not system_base_hostname_protection

- name: Reboot Warning # noqa 503
  pause:
    prompt: "Warning: This machine will reboot. Press return to continue. Press Ctrl+c and then \"a\" to abort."
  when: system_base_hostname_result.changed and reboot_protection
#Reboot appears twice because the variable is registered even if the condition is false
- name: Reboot # noqa 503
  reboot:
  when: system_base_hostname_result.changed