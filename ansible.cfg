[defaults]
duplicate_dict_key = error
inventory      = ./hosts
inventory_plugins = ./plugins
roles_path    = ./roles

[inventory]

[privilege_escalation]

[paramiko_connection]

[ssh_connection]
#Safe Default:
#ssh_args = -o StrictHostKeyChecking=accept-new
# Testing Performace Options:
ssh_args = -o StrictHostKeyChecking=accept-new -o ControlMaster=auto -o ControlPersist=5s
pipelining = True

[persistent_connection]

[accelerate]

[selinux]

[colors]

[diff]
